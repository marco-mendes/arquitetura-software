apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hospital-api
  namespace: hospital
  labels:
    app: hospital-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hospital-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
