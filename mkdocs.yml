site_name: Arquitetura de Software
use_directory_urls: true
exclude_docs: |
  superpowers/**

theme:
  name: material
  language: pt-BR
  palette:
    primary: custom
  features:
    - navigation.instant

markdown_extensions:
  - attr_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid

extra_javascript:
  - assets/javascripts/mermaid.mjs

extra_css:
  - assets/stylesheets/extra.css

hooks:
  - course_semantics.py

nav:
  - Início: index.md
  - Começar:
      - Sobre a disciplina: comecar/sobre-a-disciplina.md
      - Como usar: comecar/como-usar.md
      - Mapa de aprendizagem: comecar/mapa-de-aprendizagem.md
      - Taxonomia de Bloom: comecar/taxonomia-de-bloom.md
  - "Módulo 1 — Estilos":
      - Visão geral: modulo-1-visao-geral/index.md
      - Conceitos: modulo-1-visao-geral/conceitos.md
      - Padrões e decisões: modulo-1-visao-geral/padroes-e-decisoes.md
      - Exemplo arquitetural: modulo-1-visao-geral/exemplo-arquitetural.md
      - Estudo de caso: modulo-1-visao-geral/estudo-de-caso.md
      - Oficina de ferramentas: modulo-1-visao-geral/oficina-de-ferramentas.md
      - Exercícios: modulo-1-visao-geral/exercicios.md
      - Síntese e referências: modulo-1-visao-geral/sintese-e-referencias.md
