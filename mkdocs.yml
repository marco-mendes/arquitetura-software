site_name: Arquitetura de Software
use_directory_urls: true

theme:
  name: material
  language: pt-BR
  palette:
    primary: custom
  features:
    - navigation.instant

markdown_extensions:
  - attr_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid

extra_javascript:
  - assets/javascripts/mermaid.mjs

extra_css:
  - assets/stylesheets/extra.css

hooks:
  - course_semantics.py

nav:
  - Início: index.md
  - Começar:
      - Sobre a disciplina: comecar/sobre-a-disciplina.md
      - Como usar: comecar/como-usar.md
      - Mapa de aprendizagem: comecar/mapa-de-aprendizagem.md
      - Taxonomia de Bloom: comecar/taxonomia-de-bloom.md
  - "Módulo 1 — Estilos":
      - Visão geral: modulo-1-visao-geral/index.md
      - Conceitos: modulo-1-visao-geral/conceitos.md
      - Padrões e decisões: modulo-1-visao-geral/padroes-e-decisoes.md
      - Exemplo arquitetural: modulo-1-visao-geral/exemplo-arquitetural.md
      - Estudo de caso: modulo-1-visao-geral/estudo-de-caso.md
      - Oficina de ferramentas: modulo-1-visao-geral/oficina-de-ferramentas.md
      - Exercícios: modulo-1-visao-geral/exercicios.md
      - Síntese e referências: modulo-1-visao-geral/sintese-e-referencias.md
  - "Módulo 2 — APIs": modulo-2-apis/index.md
  - "Módulo 3 — Serviços": modulo-3-servicos/index.md
  - "Módulo 4 — Governança": modulo-4-governanca/index.md
  - "Módulo 5 — Eventos": modulo-5-eventos/index.md
  - "Módulo 6 — Nuvem": modulo-6-nuvem/index.md
  - Projeto integrador:
      - Visão geral: projeto-integrador/index.md
      - Contexto hospitalar: projeto-integrador/contexto-hospitalar.md
      - Seis incrementos: projeto-integrador/incrementos.md
      - Modelos de entrega: projeto-integrador/modelos-de-entrega.md
      - Critérios de avaliação: projeto-integrador/criterios-de-avaliacao.md
      - Template de ADR: referencia/template-adr.md
  - Referência:
      - Glossário: referencia/glossario.md
      - Atributos de qualidade: referencia/atributos-de-qualidade.md
      - Catálogo de padrões: referencia/catalogo-de-padroes.md
      - Guia de ferramentas: referencia/guia-de-ferramentas.md
      - Bibliografia: referencia/bibliografia.md
  - Sobre:
      - Plano da disciplina: sobre/plano-da-disciplina.md
